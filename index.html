  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

erif; font-size:clamp(15px,2vw,21px); letter-spacing:.02em; animation:marquee 22s linear infinite; will-change:transform;\">\n      <span>WOMBO WILL RETURN&nbsp; IF ENOUGH OF YOU TALK ABOUT HIM. &nbsp;•&nbsp; WOMBO WILL RETURN&nbsp; IF ENOUGH OF YOU TALK ABOUT HIM. &nbsp;•&nbsp;<\u002Fspan>\n      <span>WOMBO WILL RETURN&nbsp; IF ENOUGH OF YOU TALK ABOUT HIM. &nbsp;•&nbsp; WOMBO WILL RETURN&nbsp; IF ENOUGH OF YOU TALK ABOUT HIM. &nbsp;•&nbsp;<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===================== PREMISE ===================== -->\n  <section style=\"position:relative; background:#b9461f; color:#f4e7cc; padding:clamp(48px,7vw,96px) clamp(18px,5vw,64px);\">\n    <div style=\"position:absolute; inset:0; pointer-events:none; opacity:.18; background-image:radial-gradient(#2a150b 1.2px, transparent 1.5px); background-size:11px 11px;\"><\u002Fdiv>\n    <div style=\"position:relative; max-width:880px; margin:0 auto;\">\n      <div style=\"font-family:'Special Elite',monospace; letter-spacing:.3em; font-size:clamp(11px,1.5vw,14px); color:#1a1209; margin-bottom:14px;\">ACT I · THE SETUP<\u002Fdiv>\n      <h2 style=\"margin:0 0 26px; font-family:'Anton',sans-serif; font-weight:400; line-height:.94; font-size:clamp(34px,6vw,72px); color:#f4e7cc; text-shadow:3px 3px 0 #5e1f0d;\">RED DIRT. SCORCHING SUN.<br>A TOWN THAT GLOWS&nbsp;GREEN.<\u002Fh2>\n      <p style=\"font-family:'Oswald',sans-serif; font-weight:300; font-size:clamp(17px,2.1vw,23px); line-height:1.55; margin:0 0 18px; max-width:64ch;\">Charlie Phoenix wanders into <strong>Cock Wash Creek<\u002Fstrong>, a dusty mining town where <strong>Umbra Minerals<\u002Fstrong> sells poison as progress and coal as kale. He's so basic he makes white bread look exotic. He plans to keep walking.<\u002Fp>\n      <p style=\"font-family:'Oswald',sans-serif; font-weight:300; font-size:clamp(17px,2.1vw,23px); line-height:1.55; margin:0 0 18px; max-width:64ch;\">Then a radioactive wombat sinks its teeth into his leg and beige little Charlie wakes up with claws, a beard, crunchy abs and a brand-new name: <strong style=\"color:#1a1209;\">WOMBO.<\u002Fstrong><\u002Fp>\n      <p style=\"font-family:'Oswald',sans-serif; font-weight:300; font-size:clamp(17px,2.1vw,23px); line-height:1.55; margin:0; max-width:64ch;\">Mentored by the deadpan, chain-vaping Belladonna (who has secrets and an orange glow of her own), Wombo has to decide what kind of hero he is, before someone burns the whole town down. He'd really just prefer a nap.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===================== CAST ===================== -->\n  <section style=\"position:relative; background:#e6d6b4; padding:clamp(48px,7vw,90px) clamp(18px,5vw,64px);\">\n    <div style=\"position:absolute; inset:0; pointer-events:none; opacity:.14; background-image:radial-gradient(#7a2f14 1.1px, transparent 1.4px); background-size:9px 9px;\"><\u002Fdiv>\n    <div style=\"position:relative; max-width:1160px; margin:0 auto;\">\n      <h2 style=\"margin:0 0 6px; font-family:'Anton',sans-serif; font-weight:400; font-size:clamp(34px,6vw,72px); color:#7a2f14; line-height:.9; transform:rotate(-1deg);\">THE USUAL SUSPECTS<\u002Fh2>\n      <div style=\"font-family:'Special Elite',monospace; letter-spacing:.24em; font-size:clamp(11px,1.5vw,14px); color:#1a1209; margin-bottom:34px;\">WANTED · FOR CRIMES AGAINST SUBTLETY<\u002Fdiv>\n\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:clamp(18px,2.5vw,30px);\">\n        <!-- Charlie / Wombo -->\n        <div style=\"background:#1a1209; border:4px solid #1a1209; box-shadow:6px 6px 0 rgba(26,18,9,.3); transform:rotate(-1.2deg);\">\n          <div data-om-raster=\"\" style=\"display:block; width:100%; aspect-ratio:1/1; border-bottom:4px solid #1a1209; overflow:hidden;\"><svg viewBox=\"0 0 400 400\" width=\"100%\" height=\"100%\" preserveAspectRatio=\"xMidYMid slice\" xmlns=\"http://www.w3.org/2000/svg\" style=\"display:block; backgr t }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:#1a1209; border:3px solid #1a1209; box-shadow:5px 5px 0 var(--accent,#aac90f); padding:22px 24px; display:inline-block;\">\n            <div style=\"font-family:'Rye',serif; font-size:clamp(19px,2.6vw,26px); color:var(--accent,#aac90f); line-height:1.2;\">Got it, legend.<\u002Fdiv>\n            <div style=\"font-family:'Oswald',sans-serif; font-weight:300; font-size:15px; color:#cdb98e; margin-top:6px;\">bGame will be in touch soon.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ contactNotSent }}\" hint-placeholder-val=\"{{ true }}\">\n          <form onsubmit=\"{{ onContact }}\" style=\"display:flex; flex-direction:column; gap:14px;\">\n            <div style=\"display:flex; flex-wrap:wrap; gap:14px;\">\n              <input required=\"\" placeholder=\"Your name\" value=\"{{ cName }}\" oninput=\"{{ onCName }}\" style=\"flex:1 1 200px; min-width:0; font-family:'Oswald',sans-serif; font-size:16px; padding:13px 16px; border:3px solid #1a1209; background:#fff; color:#1a1209; outline:none; box-shadow:3px 3px 0 #1a1209;\">\n              <input required=\"\" type=\"email\" placeholder=\"Your email\" value=\"{{ cEmail }}\" oninput=\"{{ onCEmail }}\" style=\"flex:1 1 200px; min-width:0; font-family:'Oswald',sans-serif; font-size:16px; padding:13px 16px; border:3px solid #1a1209; background:#fff; color:#1a1209; outline:none; box-shadow:3px 3px 0 #1a1209;\">\n            <\u002Fdiv>\n            <textarea required=\"\" rows=\"4\" placeholder=\"Your message\" value=\"{{ cMsg }}\" oninput=\"{{ onCMsg }}\" style=\"font-family:'Oswald',sans-serif; font-size:16px; padding:13px 16px; border:3px solid #1a1209; background:#fff; color:#1a1209; outline:none; resize:vertical; box-shadow:3px 3px 0 #1a1209;\"><\u002Ftextarea>\n            <button type=\"submit\" style=\"align-self:flex-start; font-family:'Anton',sans-serif; font-size:clamp(15px,1.9vw,19px); letter-spacing:.03em; color:#f4e7cc; background:#1a1209; padding:15px 30px; border:3px solid #1a1209; box-shadow:5px 5px 0 var(--accent,#aac90f); cursor:pointer;\" style-hover=\"transform:translate(2px,2px); box-shadow:3px 3px 0 var(--accent,#aac90f);\">SEND IT →<\u002Fbutton>\n          <\u002Fform>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===================== FOOTER ===================== -->\n  <footer style=\"background:#1a1209; color:#cdb98e; padding:clamp(30px,4vw,48px) clamp(18px,5vw,64px); text-align:center;\">\n    <div style=\"font-family:'Anton',sans-serif; font-size:clamp(40px,9vw,110px); color:#2a150b; -webkit-text-stroke:2px #84301a; line-height:.9; letter-spacing:.02em;\">WOMBO<\u002Fdiv>\n    <div style=\"font-family:'Special Elite',monospace; font-size:13px; letter-spacing:.14em; margin-top:14px;\">A ONE-ACT MUSICAL &nbsp;·&nbsp; © bGame, JAN 2026 &nbsp;·&nbsp; SYDNEY, AUSTRALIA<\u002Fdiv>\n    <div style=\"font-family:'Oswald',sans-serif; font-weight:300; font-size:13px; color:#7a4a2a; margin-top:8px;\">Wombo will return. (If enough of you talk about him.)<\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1200,&quot;height&quot;:2400},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#aac90f&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;grainOp&quot;:{&quot;editor&quot;:&quot;float&quot;,&quot;default&quot;:0.5,&quot;min&quot;:0,&quot;max&quot;:1,&quot;step&quot;:0.05,&quot;tsType&quot;:&quot;number&quot;}}\">\nclass Component extends DCLogic {\n  state = { email: \"\", subscribed: false, cName: \"\", cEmail: \"\", cMsg: \"\", contactSent: false };\n\n  renderVals() {\n    return {\n      accent: this.props.accent ?? \"#aac90f\",\n      grainOp: this.props.grainOp ?? 0.5,\n      email: this.state.email,\n      subscribed: this.state.subscribed,\n      notSubscribed: !this.state.subscribed,\n      onEmail: (e) => this.setState({ email: e.target.value }),\n      onSubscribe: (e) => { e.preventDefault(); this.setState({ subscribed: true }); },\n\n      cName: this.state.cName,\n      cEmail: this.state.cEmail,\n      cMsg: this.state.cMsg,\n      contactSent: this.state.contactSent,\n      contactNotSent: !this.state.contactSent,\n      onCName: (e) => this.setState({ cName: e.target.value }),\n      onCEmail: (e) => this.setState({ cEmail: e.target.value }),\n      onCMsg: (e) => this.setState({ cMsg: e.target.value }),\n      onContact: (e) => { e.preventDefault(); this.setState({ contactSent: true }); },\n\n      songs: [\n        { num: \"01\", title: \"Welcome to Cock Wash Creek\", note: \"The whole poisoned town introduces itself.\", tag: \"GRITTY OPENER\" },\n        { num: \"02\", title: \"Another Day, Another Nobody\", note: \"Charlie's beige little soul, alone in the dust.\", tag: \"SLOW BURN BALLAD\" },\n        { num: \"03\", title: \"What the Hell Is Happening to Me?\", note: \"The transformation panic-duet.\", tag: \"COMEDY-ROCK / EDM\" },\n        { num: \"04\", title: \"Built Like a Brick $#!thouse\", note: \"Wombo discovers his glorious, useless new body.\", tag: \"STADIUM PARODY\" },\n        { num: \"05\", title: \"Green Is the New Black\", note: \"Declan Voss's greenwashing villain anthem.\", tag: \"SINATRA-MEETS-RAGE\" },\n        { num: \"06\", title: \"No Tomorrow\", note: \"Tingo's volcanic burn-it-all-down finale.\", tag: \"RAGE ANTHEM\" },\n      ],\n\n      quotes: [\n        { text: \"It's not pollution. It's progress.\", who: \"Declan Voss, Umbra Minerals\", tilt: \"-1.4deg\" },\n        { text: \"You're a Wombo now, built to dig and brawl. This ain't a curse, it's a calling.\", who: \"Belladonna\", tilt: \"1deg\" },\n        { text: \"A strongly worded letter can topple empires. I think. I don't know.\", who: \"Charlie\", tilt: \"-0.7deg\" },\n      ],\n\n      pitchStats: [\n        { big: \"1 ACT\", label: \"Roughly 45 to 60 minutes. Festival & Fringe-ready.\" },\n        { big: \"6 SONGS\", label: \"Six original comedy-rock numbers, including a killer villain anthem.\" },\n        { big: \"5 + ENSEMBLE\", label: \"Five principal roles plus a flexible townsfolk chorus.\" },\n        { big: \"1 SET\", label: \"A fibro house and a town square. Low build, big laughs.\" },\n      ],\n\n      whyItWorks: [\n        \"A reluctant-hero comedy with real teeth: greenwashing, climate grief and the nobody in all of us, told through fart jokes and face-melting guitar.\",\n        \"Cheap to stage, loud to watch: minimal set, maximal personality.\",\n        \"A villain song (\\u201CGreen Is the New Black\\u201D) that'll be the clip everyone shares.\",\n        \"An unmistakable Australian voice that travels anywhere with a dusty sense of humour.\",\n      ],\n\n      whatItNeeds: [\n        \"A live band that can swing from slow-burn ballad to volcanic rage.\",\n        \"A brave director who gets the comedy and the heart underneath it.\",\n        \"A town that doesn't mind being called Cock Wash Creek.\",\n      ],\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
